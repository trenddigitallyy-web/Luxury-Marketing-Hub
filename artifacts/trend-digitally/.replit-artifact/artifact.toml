kind = "web"
previewPath = "/"
title = "Trend Digitally"
version = "1.0.0"
id = "artifacts/trend-digitally"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19469

[services.development]
run = "pnpm --filter @workspace/trend-digitally run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trend-digitally", "run", "build" ]
publicDir = "artifacts/trend-digitally/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19469"
BASE_PATH = "/"
